add_newline = false

# No custom palette needed! We use standard terminal colors.

format = """
$cmd_duration у°ңҘ $directory $git_branch
$character"""

[character]
# Blue is usually mapped to "Primary" in Matugen themes
success_symbol = "[  о©ұ пҒӢ](bold fg:blue)"
error_symbol = "[  пҖҚ пҒӢ](bold fg:red)"

[package]
disabled = true

[git_branch]
# 'black' is usually the Dark Surface color
# 'white' is usually the Text color
style = "bg:black"
symbol = "у°ҳ¬"
truncation_length = 12
truncation_symbol = ""
format = "у°ңҘ [оӮ¶](bold fg:black)[$symbol $branch(:$remote_branch)](fg:white bg:black)[оӮҙ ](bold fg:black)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold red)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ· вҖҚ"
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++\($count\)](green)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[hostname]
ssh_only = false
# Purple is usually mapped to "Secondary"
format =  "[вҖў$hostname](bg:purple bold fg:black)[оӮҙ](bold fg:purple)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = true
format = 'рҹ•ҷ[\[ $time \]]($style) '
time_format = "%T"

[username]
# Blue = Primary Color
style_user = "bold bg:blue fg:black"
style_root = "red bold"
format = "[оӮ¶](bold fg:blue)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = " п‘ӯ "
read_only = " п‘– "
# Blue = Primary Color
style = "bg:blue fg:black"
truncation_length = 6
truncation_symbol = " вҖўвҖў/"
format = '[оӮ¶](bold fg:blue)[у°үӢ $path]($style)[оӮҙ](bold fg:blue)'

[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "

[cmd_duration]
min_time = 0
# Cyan is usually mapped to "Tertiary"
format = '[оӮ¶](bold fg:cyan)[у°Әў $duration](bold bg:cyan fg:black)[оӮҙ](bold fg:cyan)'