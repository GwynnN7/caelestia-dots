plugin {
    split-monitor-workspaces {
        count = 4
        keep_focused = 0
        enable_notifications = 0
        enable_persistent_workspaces = 1
        link_monitors = 0
        monitor_priority = DP-1, HDMI-A-1
    }

    hyprexpo {
        columns = 2
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = first 1
    }
}
