[general]
reaper_freq=5
renice=0
ioprio=0
inhibit_screensaver=1
disable_splitlock=1

[gpu]
apply_gpu_optimisations=accept-responsability
amd_performance_level=high

[cpu]
governor=performance

[custom]
start=caelestia shell gameMode enable && sudo scxctl switch --sched cake
end=caelestia shell gameMode disable && sudo scxctl restore
