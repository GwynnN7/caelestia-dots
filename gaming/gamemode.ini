[general]
reaper_freq=5
desiredgov=performance
desiredprof=performance

renice=10
ioprio=0

inhibit_screensaver=1
disable_splitlock=1

[gpu]
apply_gpu_optimisations=accept-responsability
amd_performance_level=high

[custom]
start=caelestia shell gameMode enable && sudo systemctl stop ananicy-cpp && sudo scxctl switch --sched cake
end=caelestia shell gameMode disable && sudo scxctl restore && sudo systemctl start ananicy-cpp
