# ### Hyprland ###
# Apps
$terminal = foot
$browser = zen-browser
$editor = micro
$fileExplorer = thunar

# Touchpad
$touchpadDisableTyping = true
$touchpadScrollFactor = 0.3
$workspaceSwipeFingers = 4
$gestureFingers = 3
$gestureFingersMore = 4

# Blur
$blurEnabled = true
$blurSpecialWs = false
$blurPopups = true
$blurInputMethods = true
$blurSize = 8
$blurPasses = 2
$blurXray = false

# Shadow
$shadowEnabled = true
$shadowRange = 20
$shadowRenderPower = 3
$shadowColour = rgba($surfaced4)

# Gaps
$workspaceGaps = 20
$windowGapsIn = 5
$windowGapsOut = 10
$singleWindowGapsOut = 20

# Window styling
$windowOpacity = 0.95
$windowRounding = 15

$windowBorderSize = 1
$activeWindowBorderColour = rgba($primarye6)
$inactiveWindowBorderColour = rgba($onSurfaceVariant11)

# Misc
$volumeStep = 5  # In percent
$cursorTheme = sweet-cursors
$cursorSize = 24


# ### Keybinds ###
# Workspaces
$kbGoToWs = Super
$kbMoveWinToWs = Super+Shift

# Window groups
$kbWindowGroupCycleNext = Alt, Tab
$kbWindowGroupCyclePrev = Shift+Alt, Tab
$kbUngroup = Super+Shift, U
$kbToggleGroup = Super, U

# Window actions
$kbScrollWin = Super
$kbMoveScrollWin = Super+Shift
$kbFocusWin = Super+Ctrl
$kbMoveWin = Super+Shift+Ctrl
$kbToggleWindowFloating = Super, G
$kbWindowPip = Super, H
$kbPinWindow = Super, P
$kbWindowFullscreen = Super, Return
$kbWindowBorderedFullscreen = Super, F
$kbCloseWindow = Super, Q

# Special workspace toggles
$kbSystemMonitor = Ctrl, Escape

# Apps
$kbTerminal = Super, T
$kbBrowser = Super, R
$kbEditor = Super, W
$kbFileExplorer = Super, E
$kbYazi = Super, Y

# Misc
$kbSession = Super, Escape
$kbShowSidebar = Super, N
$kbClearNotifs = Super+Alt, N
$kbShowPanels = Super, K
$kbLock = Super, L
$kbRestoreLock = Super+Alt, L
